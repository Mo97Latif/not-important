name: Build Mac App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest  # Tells GitHub to use a Mac mini/Pro runner

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build App Bundle
# Replace 'your_script_name.py' with your actual filename!
# --windowed creates the .app folder structure instead of a single Unix file
      run: pyinstaller --onefile --windowed weather_forecast.py

    - name: Upload Mac App
      uses: actions/upload-artifact@v4
      with:
        name: MacOS-Application
        path: dist/*.app

name: Build Windows EXE
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter selenium webdriver-manager pandas packaging setuptools
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      # سطر البناء في ملف الـ YAML
      run: |
        pyinstaller --noconsole --onefile --collect-all customtkinter --hidden-import selenium.webdriver.chrome.webdriver --hidden-import selenium.webdriver.chrome.service --hidden-import selenium.webdriver.chrome.options wind_app.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindScraper-Windows-EXE
        path: dist/wind_app.exe
